name: 🔄 每日资讯更新

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install feedparser deep-translator

      - name: 抓取并生成资讯数据
        run: python scripts/fetch_news.py

      - name: 提交更新数据
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add jsaux-data.json aecooly-data.json
          git diff --staged --quiet || git commit -m "每日资讯更新"
          git push
